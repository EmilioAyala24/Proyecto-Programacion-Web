services:
  postgres:
    image: postgres:16
    container_name: farmacia_inclusiva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmacia_inclusiva
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - farmacia_postgres_data:/var/lib/postgresql/data
      - ./BaseDeDatos/farmacia_inclusiva.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./BaseDeDatos/seeds/proveedores.sql:/docker-entrypoint-initdb.d/02-seed-proveedores.sql:ro
      - ./BaseDeDatos/seeds/catalogo_inicial.sql:/docker-entrypoint-initdb.d/03-seed-catalogo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmacia_inclusiva"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  farmacia_postgres_data:
