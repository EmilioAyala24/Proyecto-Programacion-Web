<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmacia Inclusiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <header class="header">
      <div class="header__brand">
        <div class="header__logo">
          <span class="logo-cross">✚</span>
        </div>
        <div class="header__text">
          <span class="header__name">Farmacias Gi</span>
          <span class="header__tagline">Farmacia Inclusiva</span>
        </div>
      </div>
      <div class="header__address">
        Tekuan 184, Villa Izcalli Caxitlan<br />Villa de Álvarez, Col.
      </div>
    </header>

    <section class="banner-estado banner-estado--vigente" id="bannerEstado" aria-label="Estado de vigencia del medicamento">
      <div class="banner-estado__indicador"></div>
      <div class="banner-estado__contenido">
        <span class="banner-estado__etiqueta">Estado</span>
        <strong class="banner-estado__valor" id="textoEstado">VIGENTE</strong>
      </div>
      <div class="banner-estado__icono">✔</div>
    </section>

    <main class="principal">

      <article class="tarjeta tarjeta--medicamento">
        <div class="tarjeta__encabezado">
          <span class="tarjeta__etiqueta">Medicamento</span>
          <span class="tarjeta__id">ID Lote: <span class="mono">#L-2024-0892</span></span>
        </div>

        <h1 class="medicamento__nombre">Paracetamol</h1>
        <p class="medicamento__subtitulo">Tabletas · 500 mg · 20 tabletas</p>

        <div class="medicamento__grid">
          <div class="medicamento__campo">
            <span class="medicamento__campo-etiqueta">Presentación</span>
            <span class="medicamento__campo-valor">Tableta</span>
          </div>
          <div class="medicamento__campo">
            <span class="medicamento__campo-etiqueta">Concentración</span>
            <span class="medicamento__campo-valor">500 mg</span>
          </div>
          <div class="medicamento__campo">
            <span class="medicamento__campo-etiqueta">Requiere receta</span>
            <span class="medicamento__campo-valor">No</span>
          </div>
          <div class="medicamento__campo">
            <span class="medicamento__campo-etiqueta">Contenido</span>
            <span class="medicamento__campo-valor">20 tabletas</span>
          </div>
        </div>
      </article>

  </body>
</html>
